# Aethersailor Legacy-Safe local overlay (kept for backward compatibility; prefer aethersailor-current-safe) for OpenClash SafeOps Skill v7.3
# Purpose: apply Aethersailor-style Fake-IP/DNS/sniffer/rule principles to ONE existing YAML.
# Safety: do not include proxies, proxy-groups, proxy-providers, subscription URLs, or system UCI settings.
# Notes: this file is a reference overlay. Prefer scripts/openclash_template_apply.py --template aethersailor-legacy-safe.

dns:
  enable: true
  listen: 127.0.0.1:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  use-hosts: true
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.router.asus.com"
    - "+.miwifi.com"
    - "+.tplinkwifi.net"
  nameserver:
    - system
  fallback: []

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443

geodata-mode: true

rules:
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  - DOMAIN-SUFFIX,tracker.m-team.cc,DIRECT
  - DOMAIN-SUFFIX,ipv6-tracker.m-team.cc,DIRECT
  - DOMAIN-SUFFIX,pt.btschool.club,DIRECT
  - DOMAIN-SUFFIX,jpopsuki.eu,DIRECT
  - GEOSITE,private,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT
