__safeops_meta__:
  name: ffani-redirhost-smartdns
  mode: candidate-only
  note: YAML candidate only. SmartDNS/OpenWrt system changes must be handled manually outside SafeOps.

mode: rule
log-level: info
ipv6: false

dns:
  enable: true
  enhanced-mode: redir-host
  listen: 0.0.0.0:7874
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 127.0.0.1:6053

rules:
  - DOMAIN-SUFFIX,lan,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,PROXY
