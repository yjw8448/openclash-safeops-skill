# Manual checklist only. Do not auto-apply these system-level items.
manual_checks:
  - Confirm SmartDNS is installed and healthy.
  - Confirm only one service owns upstream DNS for dnsmasq.
  - Confirm OpenClash DNS listening port does not conflict with SmartDNS.
  - Do not edit /etc/config/dhcp, /etc/config/network, or /etc/config/firewall from SafeOps.
